<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diabetes Selbstmanagement</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #121212; color: white; display: flex; flex-direction: column; align-items: center; padding: 40px 20px; margin: 0; }
        h1 { color: #5dade2; margin-bottom: 30px; text-align: center; font-size: 28px; }
        .grid { display: grid; grid-template-columns: 1fr; gap: 20px; width: 100%; max-width: 400px; }
        
        /* Der Button-Style */
        .nav-button { 
            background: #1e1e1e; 
            border: 2px solid #3498db; 
            color: white; 
            padding: 25px; 
            border-radius: 15px; 
            text-decoration: none; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-size: 20px; 
            font-weight: bold; 
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        .nav-button:active { transform: scale(0.95); background: #3498db; }
        
        .icon { margin-right: 15px; font-size: 24px; }
        .footer { margin-top: 50px; color: #555; font-size: 12px; }
    </style>
</head>
<body>

    <h1>Diabetes Selbstmanagement</h1>

    <div class="grid">
        <a href="https://patrick2305blume-eng.github.io/Basal-Rechner-/" class="nav-button">
            <span class="icon">📊</span> Basalraten Rechner
        </a>

        </div>

    <div class="footer">Dashboard v1.0</div>

</body>
</html>
